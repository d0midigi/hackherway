<!doctype html>
<html lang="en"><head><script src="/_sdk/telemetry_sdk.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Online Glossary</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&amp;display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <style>
        body { font-family: 'DM Sans', sans-serif; }
    </style>
  <script src="/_sdk/data_sdk.js"></script>
  <script src="/_sdk/resizing_sdk.js" type="text/javascript"></script>
 </head>
 <body data-template-id="__page-root" class="min-h-screen w-full" style="background: rgb(240, 253, 244);">
  <header class="w-full border-b border-emerald-200 bg-white/80 backdrop-blur sticky top-0 z-10">
   <div class="max-w-3xl mx-auto px-6 py-5">
    <h1 data-template-id="page-title" class="canva-text" style="color: rgb(6, 78, 59); font-weight: 700; font-style: normal; font-size: 32px;">My Glossary</h1>
    <p data-template-id="page-subtitle" class="canva-text mt-1" style="color: rgb(107, 114, 128); font-weight: 400; font-style: normal; font-size: 14px;">Add terms and definitions to build your personal glossary.</p>
   </div>
  </header>
  <main class="max-w-3xl mx-auto px-6 py-8">
   <form id="glossary-form" class="rounded-xl border border-gray-200 bg-white p-6 shadow-sm mb-8"><label data-template-id="term-label" for="term-input" class="canva-text block mb-1 font-medium" style="color: rgb(17, 24, 39); font-weight: 500; font-style: normal; font-size: 16px;">Term</label> <input id="term-input" data-template-id="term-input" class="canva-input w-full border border-gray-300 rounded-lg px-4 py-2 mb-4 focus:outline-none focus:ring-2 focus:ring-emerald-400" type="text" required="" placeholder="Enter a term…" style="background: rgb(255, 255, 255); font-weight: 400; font-style: normal; font-size: 16px;"> <label data-template-id="definition-label" for="def-input" class="canva-text block mb-1 font-medium" style="color: rgb(17, 24, 39); font-weight: 500; font-style: normal; font-size: 16px;">Definition</label> <textarea id="def-input" data-template-id="definition-input" class="canva-input w-full border border-gray-300 rounded-lg px-4 py-2 mb-4 h-24 resize-none focus:outline-none focus:ring-2 focus:ring-emerald-400" required="" style="background: rgb(255, 255, 255); font-weight: 400; font-style: normal; font-size: 16px;">Enter the meaning…</textarea> <button data-template-id="submit-button" type="submit" class="canva-button px-6 py-2 rounded-lg font-medium transition hover:opacity-90" style="background: rgb(5, 150, 105); color: rgb(255, 255, 255); font-weight: 600; font-style: normal; font-size: 16px;">Add to Glossary</button>
   </form>
   <div id="glossary-list" class="space-y-3">
    <p data-template-id="empty-state" id="empty-state" class="canva-text text-center py-12" style="color: rgb(156, 163, 175); font-weight: 400; font-style: italic; font-size: 16px;">Your glossary is empty. Add your first term above!</p>
   </div>
   <p id="limit-warning" class="hidden text-red-600 text-center font-medium mt-4">Maximum 999 entries reached. Please delete some entries first.</p>
  </main>
  <template id="entry-template">
   <div data-template-id="entry-card" class="canva-card rounded-lg border border-gray-100 bg-white p-4 shadow-sm flex justify-between items-start gap-4">
    <div class="flex-1 min-w-0">
     <h3 data-template-id="entry-term" class="canva-text font-semibold"></h3>
     <p data-template-id="entry-definition" class="canva-text mt-1"></p>
    </div><button class="delete-btn flex-shrink-0 text-gray-400 hover:text-red-500 transition" aria-label="Delete entry"> <i data-lucide="trash-2" style="width:18px;height:18px;"></i> </button>
   </div>
  </template>
  <script src="/_sdk/editing_sdk.js"></script>
  <script>
        let glossaryData = [];
        const form = document.getElementById('glossary-form');
        const list = document.getElementById('glossary-list');
        const emptyState = document.getElementById('empty-state');
        const limitWarning = document.getElementById('limit-warning');
        const template = document.getElementById('entry-template');

        const handler = {
            onDataChanged(data) {
                glossaryData = data.slice().sort((a, b) => (a.term || '').localeCompare(b.term || '', undefined, {sensitivity: 'base'}));
                renderList();
            }
        };

        function renderList() {
            const existing = new Map([...list.querySelectorAll('[data-entry-id]')].map(el => [el.dataset.entryId, el]));

            if (glossaryData.length === 0) {
                emptyState.classList.remove('hidden');
                existing.forEach(el => el.remove());
                return;
            }
            emptyState.classList.add('hidden');

            const fragment = document.createDocumentFragment();
            const seen = new Set();

            glossaryData.forEach(item => {
                const id = item.__backendId;
                seen.add(id);
                if (existing.has(id)) {
                    const el = existing.get(id);
                    el.querySelector('[data-template-id="entry-term"]').textContent = item.term;
                    el.querySelector('[data-template-id="entry-definition"]').textContent = item.definition;
                    fragment.appendChild(el);
                } else {
                    const clone = template.content.cloneNode(true);
                    const wrapper = clone.firstElementChild;
                    wrapper.dataset.entryId = id;
                    wrapper.querySelector('[data-template-id="entry-term"]').textContent = item.term;
                    wrapper.querySelector('[data-template-id="entry-definition"]').textContent = item.definition;
                    wrapper.querySelector('.delete-btn').addEventListener('click', () => deleteEntry(item));
                    fragment.appendChild(wrapper);
                }
            });

            existing.forEach((el, id) => { if (!seen.has(id)) el.remove(); });
            list.appendChild(fragment);
            lucide.createIcons();
        }

        async function deleteEntry(item) {
            const result = await window.dataSdk.delete(item);
            if (!result.isOk) {
                alert = null; // safety
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (glossaryData.length >= 999) {
                limitWarning.classList.remove('hidden');
                return;
            }
            limitWarning.classList.add('hidden');
            const termInput = document.getElementById('term-input');
            const defInput = document.getElementById('def-input');
            const term = termInput.value.trim();
            const definition = defInput.value.trim();
            if (!term || !definition) return;

            const btn = form.querySelector('button[type="submit"]');
            btn.disabled = true;
            btn.style.opacity = '0.5';

            const result = await window.dataSdk.create({ term, definition, created_at: new Date().toISOString() });
            btn.disabled = false;
            btn.style.opacity = '1';

            if (result.isOk) {
                termInput.value = '';
                defInput.value = '';
                termInput.focus();
            }
        });

        (async () => {
            const initResult = await window.dataSdk.init(handler);
            if (!initResult.isOk) {
                emptyState.textContent = 'Failed to load glossary data.';
            }
            lucide.createIcons();
        })();
    </script>
